<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        canvas {
            border: 2px solid #fff;
            background-color: #000;
            max-width: 100%;
            height: auto;
        }
        #ui {
            margin-bottom: 10px;
            text-align: center;
        }
        .controls {
            margin-top: 10px;
            font-size: 0.8em;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">Score: 0</div>
        <div style="margin-bottom: 20px;">
            <a href="index.html" style="color: #0f0; margin-right: 15px; text-decoration: none; border-bottom: 2px solid #0f0;">Space Invaders</a>
            <a href="flappy.html" style="color: #aaa; text-decoration: none;">Flappy Bird</a>
        </div>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    
    <div id="mobileControls" style="display: none; width: 100%; max-width: 600px; justify-content: space-between; margin-top: 20px; font-family: sans-serif;">
        <div style="display: flex; gap: 10px;">
            <button id="leftBtn" style="width: 80px; height: 80px; font-size: 40px; background: #333; color: #fff; border: 2px solid #fff; border-radius: 10px; touch-action: none;">←</button>
            <button id="rightBtn" style="width: 80px; height: 80px; font-size: 40px; background: #333; color: #fff; border: 2px solid #fff; border-radius: 10px; touch-action: none;">→</button>
        </div>
        <button id="shootBtn" style="width: 120px; height: 80px; font-size: 20px; font-weight: bold; background: #f00; color: #fff; border: 2px solid #fff; border-radius: 10px; touch-action: none;">SHOOT</button>
    </div>

    <div class="controls">ARROWS to Move | SPACE to Shoot</div>

    <script>
        // --- Sound Engine ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type, freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playShootSound() { playSound('triangle', 600, 0.1); }
        function playExplosionSound() { playSound('sawtooth', 150, 0.3); }
        function playGameOverSound() { playSound('square', 100, 1); }
        // --------------------

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Game Constants
        const PLAYER_WIDTH = 30;
        const PLAYER_HEIGHT = 20;
        const ALIEN_ROWS = 4;
        const ALIEN_COLS = 8;
        const ALIEN_SIZE = 24; // Slightly larger for emojis
        const ALIEN_SPACING = 20;
        const BULLET_SPEED = 5;

        const FRUITS_VEGGIES = ['🍎', '🥦', '🥕', '🌽', '🍅', '🫐', '🍇', '🍐'];
        const CATS_DOGS = ['🐱', '🐶', '🐈', '🐕', '🐯', '🐺', '🦊', '🦁'];
        const ALL_TARGETS = [...FRUITS_VEGGIES, ...CATS_DOGS];

        // State Variables
        let score = 0;
        let gameOver = false;
        let player = { x: canvas.width / 2 - PLAYER_WIDTH / 2, y: canvas.height - 40 };
        let bullets = [];
        let aliens = [];
        let saucer = { x: -50, y: 20, active: false, speed: 2 };
        let alienDirection = 1;
        let alienMoveTimer = 0;
        let alienMoveInterval = 1000;
        let saucerTimer = 0;

        // Keys
        const keys = {};

        function initAliens() {
            aliens = [];
            saucer.active = false;
            saucerTimer = 0;
            for (let r = 0; r < ALIEN_ROWS; r++) {
                for (let c = 0; c < ALIEN_COLS; c++) {
                    aliens.push({
                        x: c * (ALIEN_SIZE + ALIEN_SPACING) + 50,
                        y: r * (ALIEN_SIZE + ALIEN_SPACING) + 30,
                        alive: true,
                        emoji: ALL_TARGETS[Math.floor(Math.random() * ALL_TARGETS.length)]
                    });
                }
            }
        }

        function drawPlayer() {
            ctx.fillStyle = '#0f0';
            ctx.fillRect(player.x, player.y, PLAYER_WIDTH, PLAYER_HEIGHT);
            // Cannon part
            ctx.fillRect(player.x + PLAYER_WIDTH/2 - 2, player.y - 5, 4, 5);
        }

        function drawAliens() {
            aliens.forEach(alien => {
                if (alien.alive) {
                    ctx.font = `${ALIEN_SIZE}px serif`;
                    ctx.fillText(alien.emoji, alien.x, alien.y + ALIEN_SIZE);
                }
            });

            // Draw Saucer
            if (saucer.active) {
                ctx.font = `30px serif`;
                ctx.fillText('🛸', saucer.x, saucer.y + 25);
            }
        }

        function drawBullets() {
            ctx.fillStyle = '#fff';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 3, 10);
            });
        }

        function update() {
            if (gameOver) return;

            // Player Movement
            if (keys['ArrowLeft'] && player.x > 0) player.x -= 4;
            if (keys['ArrowRight'] && player.x < canvas.width - PLAYER_WIDTH) player.x += 4;

            // Bullet Movement
            bullets.forEach((bullet, index) => {
                bullet.y -= BULLET_SPEED;
                if (bullet.y < 0) bullets.splice(index, 1);
            });

            // Alien Movement
            alienMoveTimer += 16.67; 
            if (alienMoveTimer > alienMoveInterval) {
                let changeDir = false;
                aliens.forEach(alien => {
                    if (!alien.alive) return;
                    alien.x += 20 * alienDirection;
                    if (alien.x > canvas.width - ALIEN_SIZE || alien.x < 0) {
                        changeDir = true;
                    }
                });

                if (changeDir) {
                    alienDirection *= -1;
                    aliens.forEach(alien => {
                        alien.y += 20;
                        if (alien.y + ALIEN_SIZE >= player.y) {
                            gameOver = true;
                            playGameOverSound();
                        }
                    });
                }
                alienMoveTimer = 0;
            }

            // Saucer Logic
            saucerTimer += 16.67;
            if (!saucer.active && saucerTimer > 10000) { // Every 10 seconds
                saucer.active = true;
                saucer.x = -50;
                saucerTimer = 0;
            }
            if (saucer.active) {
                saucer.x += saucer.speed;
                if (saucer.x > canvas.width) {
                    saucer.active = false;
                }
            }

            // Collision Detection
            bullets.forEach((bullet, bIndex) => {
                // Check Saucer collision
                if (saucer.active &&
                    bullet.x > saucer.x && bullet.x < saucer.x + 30 &&
                    bullet.y > saucer.y && bullet.y < saucer.y + 20) {
                    saucer.active = false;
                    bullets.splice(bIndex, 1);
                    score += 100; // Big bonus
                    scoreElement.innerText = `Score: ${score}`;
                    playExplosionSound();
                }

                aliens.forEach((alien, aIndex) => {
                    if (alien.alive &&
                        bullet.x > alien.x && bullet.x < alien.x + ALIEN_SIZE &&
                        bullet.y > alien.y && bullet.y < alien.y + ALIEN_SIZE) {
                        alien.alive = false;
                        bullets.splice(bIndex, 1);
                        score += 10;
                        scoreElement.innerText = `Score: ${score}`;
                        playExplosionSound();
                        // Speed up if aliens killed
                        alienMoveInterval *= 0.98;
                    }
                });
            });

            // Check Win
            if (aliens.every(a => !a.alive)) {
                alert("YOU WIN! Aliens Defeated.");
                resetGame();
            }
        }

        function resetGame() {
            score = 0;
            scoreElement.innerText = "Score: 0";
            player.x = canvas.width / 2 - PLAYER_WIDTH / 2;
            bullets = [];
            alienMoveInterval = 1000;
            gameOver = false;
            initAliens();
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            update();
            drawPlayer();
            drawAliens();
            drawBullets();

            if (gameOver) {
                ctx.fillStyle = "white";
                ctx.font = "30px Courier New";
                ctx.fillText("GAME OVER", canvas.width / 2 - 80, canvas.height / 2);
                ctx.font = "15px Courier New";
                ctx.fillText("Click to Restart", canvas.width / 2 - 70, canvas.height / 2 + 30);
            }
            requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', e => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            keys[e.code] = true;
            if (e.code === 'Space' && !gameOver) {
                bullets.push({ x: player.x + PLAYER_WIDTH / 2 - 1.5, y: player.y });
                playShootSound();
            }
            if (gameOver) resetGame();
        });

        window.addEventListener('keyup', e => keys[e.code] = false);
        canvas.addEventListener('click', () => { if (gameOver) resetGame(); });

        // --- Mobile Logic ---
        if ('ontouchstart' in window) {
            document.getElementById('mobileControls').style.display = 'flex';
            const leftBtn = document.getElementById('leftBtn');
            const rightBtn = document.getElementById('rightBtn');
            const shootBtn = document.getElementById('shootBtn');

            leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowLeft'] = true; });
            leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys['ArrowLeft'] = false; });
            rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowRight'] = true; });
            rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys['ArrowRight'] = false; });
            
            shootBtn.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (!gameOver) {
                    bullets.push({ x: player.x + PLAYER_WIDTH / 2 - 1.5, y: player.y });
                    playShootSound();
                } else {
                    resetGame();
                }
            });
        }
        // --------------------

        initAliens();
        loop();
    </script>
</body>
</html>
