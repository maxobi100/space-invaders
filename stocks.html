<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnificent 7 Stocks</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 30px; font-weight: 300; }
        .nav { margin-bottom: 20px; text-align: center; }
        .nav a { color: #aaa; text-decoration: none; margin: 0 10px; font-size: 0.9em; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        .stat-card {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .symbol { font-weight: bold; color: #4bc0c0; display: block; margin-bottom: 5px; }
        .price { font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">Space Invaders</a>
        <a href="flappy.html">Flappy Bird</a>
        <a href="stocks.html" style="color: #4bc0c0; border-bottom: 1px solid #4bc0c0;">Mag 7 Stocks</a>
    </div>

    <h1>Magnificent 7 Stocks</h1>
    
    <div class="container">
        <canvas id="stockChart"></canvas>
    </div>

    <div class="stats" id="statsGrid"></div>

    <script>
        const stockData = [
            { symbol: 'NVDA', name: 'NVIDIA', price: 175.51, color: '#76b900' },
            { symbol: 'AAPL', name: 'Apple', price: 251.49, color: '#a2aaad' },
            { symbol: 'MSFT', name: 'Microsoft', price: 383.00, color: '#00a4ef' },
            { symbol: 'AMZN', name: 'Amazon', price: 207.10, color: '#ff9900' },
            { symbol: 'META', name: 'Meta', price: 603.94, color: '#0668E1' },
            { symbol: 'GOOGL', name: 'Alphabet', price: 302.06, color: '#4285f4' },
            { symbol: 'TSLA', name: 'Tesla', price: 380.85, color: '#cc0000' }
        ];

        // Sort by price for better visualization
        stockData.sort((a, b) => b.price - a.price);

        // Populate stats grid
        const statsGrid = document.getElementById('statsGrid');
        stockData.forEach(stock => {
            const card = document.createElement('div');
            card.className = 'stat-card';
            card.innerHTML = `
                <span class="symbol">${stock.symbol}</span>
                <span class="price">$${stock.price.toFixed(2)}</span>
            `;
            statsGrid.appendChild(card);
        });

        // Initialize Chart
        const ctx = document.getElementById('stockChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: stockData.map(s => s.symbol),
                datasets: [{
                    label: 'Stock Price (USD) - March 24, 2026',
                    data: stockData.map(s => s.price),
                    backgroundColor: stockData.map(s => s.color),
                    borderColor: stockData.map(s => s.color),
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                indexAxis: 'y',
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return ` $${context.parsed.x.toFixed(2)}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: '#333' },
                        ticks: { color: '#aaa' }
                    },
                    y: {
                        grid: { display: false },
                        ticks: { color: '#fff', font: { size: 14, weight: 'bold' } }
                    }
                }
            }
        });
    </script>
</body>
</html>
