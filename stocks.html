<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnificent 7 Stocks</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 30px; font-weight: 300; }
        .nav { margin-bottom: 20px; text-align: center; }
        .nav a { color: #aaa; text-decoration: none; margin: 0 10px; font-size: 0.9em; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        .stat-card {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .symbol { font-weight: bold; color: #4bc0c0; display: block; margin-bottom: 5px; }
        .price { font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">Space Invaders</a>
        <a href="flappy.html">Flappy Bird</a>
        <a href="stocks.html" style="color: #4bc0c0; border-bottom: 1px solid #4bc0c0;">Mag 7 Stocks</a>
    </div>

    <h1>Magnificent 7 Stocks</h1>
    
    <div class="container">
        <canvas id="stockChart"></canvas>
    </div>

    <div class="stats" id="statsGrid"></div>

    <script>
        const API_KEY = 'd71h85pr01qot5jddtq0d71h85pr01qot5jddtqg';
        const symbols = ['NVDA', 'AAPL', 'MSFT', 'AMZN', 'META', 'GOOGL', 'TSLA'];
        const stockInfo = {
            'NVDA': { name: 'NVIDIA', color: '#76b900' },
            'AAPL': { name: 'Apple', color: '#a2aaad' },
            'MSFT': { name: 'Microsoft', color: '#00a4ef' },
            'AMZN': { name: 'Amazon', color: '#ff9900' },
            'META': { name: 'Meta', color: '#0668E1' },
            'GOOGL': { name: 'Alphabet', color: '#4285f4' },
            'TSLA': { name: 'Tesla', color: '#cc0000' }
        };

        let chart;

        async function fetchPrices() {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Fetching live data...</p>';
            
            const results = await Promise.all(symbols.map(async (symbol) => {
                try {
                    const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`);
                    const data = await response.json();
                    return { 
                        symbol, 
                        price: data.c, // current price
                        change: data.dp, // percent change
                        ...stockInfo[symbol]
                    };
                } catch (e) {
                    console.error(`Error fetching ${symbol}`, e);
                    return null;
                }
            }));

            const validData = results.filter(r => r !== null && r.price > 0).sort((a, b) => b.price - a.price);
            updateUI(validData);
        }

        function updateUI(data) {
            // Update Grid
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '';
            
            data.forEach(stock => {
                const card = document.createElement('div');
                card.className = 'stat-card';
                const changeColor = stock.change >= 0 ? '#4bc0c0' : '#ff4b4b';
                card.innerHTML = `
                    <span class="symbol">${stock.symbol}</span>
                    <span class="price">$${stock.price.toFixed(2)}</span>
                    <span style="display:block; font-size: 0.8em; color: ${changeColor}">${stock.change >= 0 ? '+' : ''}${stock.change.toFixed(2)}%</span>
                `;
                statsGrid.appendChild(card);
            });

            // Update/Create Chart
            const ctx = document.getElementById('stockChart').getContext('2d');
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(s => s.symbol),
                    datasets: [{
                        label: 'Live Price (USD)',
                        data: data.map(s => s.price),
                        backgroundColor: data.map(s => s.color),
                        borderColor: data.map(s => s.color),
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    indexAxis: 'y',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ` $${context.parsed.x.toFixed(2)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { grid: { color: '#333' }, ticks: { color: '#aaa' } },
                        y: { grid: { display: false }, ticks: { color: '#fff', font: { size: 14, weight: 'bold' } } }
                    }
                }
            });
        }

        fetchPrices();
        // Refresh every 60 seconds
        setInterval(fetchPrices, 60000);
    </script>
</body>
</html>
